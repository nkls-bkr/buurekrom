services:
  postgres:
    image: postgis/postgis:18-3.6
    container_name: buurekrom_paths_db
    environment:
      POSTGRES_DB: buurekrom_paths
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_buurekrom_paths:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data_buurekrom_paths:
