    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #17341d;
      }
      #root:empty::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
          url("/buurekrom_512x512.png") center 40% / 128px no-repeat,
          #17341d;
      }
      #root:empty::after {
        content: "";
        position: fixed;
        left: 50%;
        top: calc(40% + 110px);
        width: 36px;
        height: 36px;
        margin-left: -18px;
        border: 3px solid rgba(255, 255, 255, 0.25);
        border-top-color: #ffffff;
        border-radius: 50%;
        animation: app-spin 0.8s linear infinite;
      }
      @keyframes app-spin {
        to {
          transform: rotate(360deg);
        }
      }
      #ios-notch {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: env(safe-area-inset-top);
        background: #17341d;
        z-index: 9999;
        pointer-events: none;
      }
    </style>
